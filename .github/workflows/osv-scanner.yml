name: OSV Dependency Scan

on:
  push:
    branches: [main]
    paths:
      - 'requirements.txt'
      - 'dev-requirements.txt'
      - '.github/workflows/osv-scanner.yml'
  pull_request:
    branches: [main]
    paths:
      - 'requirements.txt'
      - 'dev-requirements.txt'
  schedule:
    # Run weekly on Monday at 00:00 UTC to catch new CVEs
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write  # Required for SARIF upload
  actions: read           # Required for OSV-Scanner action

jobs:
  osv-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies for pyscard
        run: sudo apt-get install -y libpcsclite-dev swig

      - name: Install dependencies and resolve exact versions
        run: |
          python -m pip install --upgrade pip

          # Read requirements files handling UTF-16 BOM encoding
          python3 -c "
          import sys

          def process_file(filename):
              try:
                  with open(filename, 'r', encoding='utf-8', errors='replace') as f:
                      content = f.read()
                  if '\x00' in content:
                      with open(filename, 'r', encoding='utf-16') as f2:
                          content = f2.read()
                  lines = []
                  for line in content.splitlines():
                      line = line.strip()
                      if not line or line.startswith(('#', '-i', '--')):
                          continue
                      lines.append(line)
                  return lines
              except Exception as e:
                  print(f'Error processing {filename}: {e}', file=sys.stderr)
                  return []

          lines = process_file('requirements.txt') + process_file('dev-requirements.txt')
          for line in lines:
              print(line)
          " > combined-requirements.txt

          echo "Installing packages to resolve exact versions..."
          pip install -r combined-requirements.txt --quiet

          echo "Generating resolved lockfile from installed packages..."
          pip freeze > installed-requirements.txt

          echo "Resolved packages (first 10):"
          head -10 installed-requirements.txt
          echo "Total: $(wc -l < installed-requirements.txt) packages"

      - name: Install OSV-Scanner
        run: |
          curl -LO https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64
          chmod +x osv-scanner_linux_amd64
          sudo mv osv-scanner_linux_amd64 /usr/local/bin/osv-scanner

      - name: Run OSV-Scanner
        id: osv-scanner
        continue-on-error: true
        run: |
          echo "Running OSV-Scanner on resolved installed versions..."
          echo "=================================================="
          echo ""

          set +e
          osv-scanner --lockfile=installed-requirements.txt
          SCAN_EXIT_CODE=$?
          set -e

          echo ""
          echo "Generating SARIF report..."
          osv-scanner --lockfile=installed-requirements.txt --format=sarif --output=results.sarif 2>&1 || {
            echo "⚠️  SARIF generation encountered issues"
            echo "    Scan results are still valid - see output above"
          }

          if [ -f results.sarif ] && [ -s results.sarif ]; then
            echo "✓ SARIF file created successfully"
            ls -lh results.sarif
          fi

          exit $SCAN_EXIT_CODE

      - name: Upload SARIF results to GitHub Security
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: osv-scanner

      - name: Success - No vulnerabilities found
        if: steps.osv-scanner.outcome == 'success'
        run: |
          echo "=========================================="
          echo "✅ No Vulnerabilities Found"
          echo "=========================================="
          echo ""
          echo "All Python dependencies (requirements.txt + dev-requirements.txt)"
          echo "are free of known vulnerabilities."
          echo ""

      - name: Check OSV-Scanner results
        if: steps.osv-scanner.outcome == 'failure'
        run: |
          echo "=========================================="
          echo "⚠️  Vulnerabilities Found in Dependencies"
          echo "=========================================="
          echo ""
          echo "OSV-Scanner detected security vulnerabilities in your Python dependencies"
          echo "(requirements.txt + dev-requirements.txt)."
          echo ""
          echo "Review the findings:"
          echo "  1. Check the workflow output above for detailed vulnerability list"
          echo "  2. Go to: Security tab -> Code scanning alerts"
          echo "  3. Filter by 'osv-scanner' category to see all vulnerabilities"
          echo ""
          echo "How to fix:"
          echo "  • Review each vulnerability and assess its impact on your project"
          echo "  • Update affected packages in requirements.txt and/or dev-requirements.txt"
          echo "  • Check for available updates: pip list --outdated"
          echo "  • Test thoroughly after updating dependencies"
          echo ""
          echo "Resources:"
          echo "  • OSV Database: https://osv.dev/"
          echo "  • Package info: https://pypi.org/project/[package-name]/"
          echo ""
          exit 1
